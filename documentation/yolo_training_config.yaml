# =============================================================================
# YOLO Training Configuration for Waste Classification
# =============================================================================
#
# This configuration file defines the dataset structure and class names
# for training a YOLOv8 model on waste classification.
#
# Usage:
#   yolo train data=config/yolo_training_config.yaml model=yolov8n.pt epochs=100
#
# Or with Python:
#   from ultralytics import YOLO
#   model = YOLO('yolov8n.pt')
#   model.train(data='config/yolo_training_config.yaml', epochs=100)
#
# =============================================================================

# Dataset paths (relative to this file or absolute paths)
path: ../datasets/merged  # Root path to dataset
train: images/train       # Train images (relative to 'path')
val: images/val           # Validation images (relative to 'path')
test: images/test         # Test images (optional)

# Number of classes
nc: 61

# Class names (id: name mapping)
# Organized by bin category for clarity
names:
  # =========================================================================
  # PLASTIC BIN (0) - Blue
  # =========================================================================
  0: pet_water_bottle
  1: pet_soda_bottle
  2: hdpe_milk_jug
