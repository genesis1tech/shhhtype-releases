#   5: food_waste
#   6: plastic_bag
#   7: styrofoam
#   8: snack_wrapper
#   9: other


# =============================================================================
# NOTES
# =============================================================================
#
# 1. Start with yolov8n.pt (nano) for fastest training, then scale up:
#    - yolov8n.pt: Fastest, smallest (3.2M params)
#    - yolov8s.pt: Small (11.2M params)
#    - yolov8m.pt: Medium (25.9M params) - Good balance
#    - yolov8l.pt: Large (43.7M params)
#    - yolov8x.pt: Extra large (68.2M params)
#
# 2. For Jetson deployment, yolov8n or yolov8s recommended
#
# 3. Increase imgsz if detecting small items (straws, caps)
#
# 4. Use mosaic and mixup augmentation for better generalization
#
# 5. Monitor mAP50 and mAP50-95 during training
#    Target: mAP50 > 0.85, mAP50-95 > 0.65
#
# =============================================================================
