# =============================================================================
# SORTING DECISION RULES
# =============================================================================

sorting_rules:
  # Priority order for condition-based overrides
  condition_priority:
    - soiled
    - wet
    - damaged
    - crushed
    - clean
    
  # Confidence thresholds
  thresholds:
    high_confidence: 0.9    # Direct sort
    medium_confidence: 0.7  # Sort with flag
    low_confidence: 0.5     # Review queue
    reject: 0.3             # Don't sort, alert user
    
  # Special handling rules
  special_cases:
    # Soiled recyclables go to trash (except paper → compost)
    - condition: soiled
      materials: [PET, HDPE, PP, ALUMINUM, STEEL]
      override_bin: TRASH
      
    - condition: soiled
      materials: [PAPER, CARDBOARD]
      override_bin: COMPOST
      
    # Wet paper goes to trash
    - condition: wet
      materials: [PAPER, CARDBOARD]
      override_bin: TRASH
      
    # Broken glass - handle carefully
    - object_type: broken_glass
      alert: true
      message: "Broken glass detected - handle with care"
