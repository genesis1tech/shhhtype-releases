# =============================================================================
# WASTE CLASSIFICATION TAXONOMY
# =============================================================================
#
# Complete taxonomy for smart waste bin classification system.
# Defines materials, objects, conditions, and bin mappings.
#
# Version: 1.0
# Date: January 2026
#
# =============================================================================

version: "1.0"
total_categories: 61

# =============================================================================
# BIN DEFINITIONS
# =============================================================================

bins:
  PLASTIC:
    id: 0
    color_code: "#3498db"  # Blue
    color_name: "Blue"
    description: "Recyclable plastics (PET, HDPE, PP)"
    accepted_materials:
      - PET
      - HDPE
      - PP
    notes: "Must be clean and dry. Remove caps."
    
  METAL:
    id: 1
    color_code: "#95a5a6"  # Silver/Gray
    color_name: "Silver"
    description: "Aluminum and steel items"
    accepted_materials:
      - ALUMINUM
      - STEEL
    notes: "Rinse food cans. Crush cans to save space."
    
  GLASS:
    id: 2
    color_code: "#27ae60"  # Green
    color_name: "Green"
    description: "Glass bottles and jars"
    accepted_materials:
      - GLASS
    notes: "Remove lids. Do not include broken glass in some facilities."
    
  PAPER:
    id: 3
    color_code: "#f1c40f"  # Yellow
    color_name: "Yellow"
    description: "Paper and cardboard"
    accepted_materials:
      - PAPER
      - CARDBOARD
    notes: "Must be clean and dry. Flatten boxes."
    
  COMPOST:
    id: 4
    color_code: "#8b4513"  # Brown
    color_name: "Brown"
    description: "Food waste and organics"
    accepted_materials:
      - ORGANIC
    notes: "No meat/dairy in some facilities. Check local rules."
    
  TRASH:
    id: 5
    color_code: "#2c3e50"  # Black
    color_name: "Black"
    description: "Non-recyclable waste"
    accepted_materials:
      - PS
      - PVC
      - LDPE
      - COMPOSITE
      - TEXTILE
      - OTHER
    notes: "Last resort. Try to minimize."


# =============================================================================
# MATERIAL DEFINITIONS
# =============================================================================

materials:
  # ---------------------------------------------------------------------------
  # PLASTICS
  # ---------------------------------------------------------------------------
  PET:
    full_name: "Polyethylene Terephthalate"
    resin_code: 1
    recyclable: true
    default_bin: PLASTIC
    common_items:
      - Water bottles
      - Soda bottles
      - Food containers
    identification_tips:
      - Clear or slightly tinted
      - Often has recycling symbol #1
      - Lightweight
      
  HDPE:
    full_name: "High-Density Polyethylene"
    resin_code: 2
    recyclable: true
    default_bin: PLASTIC
    common_items:
      - Milk jugs
      - Detergent bottles
      - Shampoo bottles
    identification_tips:
      - Usually opaque white or colored
      - Feels waxy
      - Recycling symbol #2
      
  PVC:
    full_name: "Polyvinyl Chloride"
    resin_code: 3
    recyclable: false
    default_bin: TRASH
    common_items:
      - Pipes
      - Some packaging
      - Credit cards
    identification_tips:
      - Hard and rigid
      - Recycling symbol #3
      - Often clear
    notes: "NOT recyclable in most programs"
      
  LDPE:
    full_name: "Low-Density Polyethylene"
    resin_code: 4
    recyclable: false  # Not in curbside, but store drop-off
    default_bin: TRASH
    common_items:
      - Plastic bags
      - Squeeze bottles
      - Plastic wrap
    identification_tips:
      - Flexible and soft
      - Recycling symbol #4
      - Often transparent
    notes: "Return to store for special recycling"
      
  PP:
    full_name: "Polypropylene"
    resin_code: 5
    recyclable: true
    default_bin: PLASTIC
    common_items:
      - Yogurt cups
      - Bottle caps
      - Straws (some)
    identification_tips:
      - Slightly flexible
      - Often cloudy or opaque
      - Recycling symbol #5
      
  PS:
    full_name: "Polystyrene (Styrofoam)"
    resin_code: 6
    recyclable: false
    default_bin: TRASH
    common_items:
      - Styrofoam cups
      - Takeout containers
      - Packing peanuts
    identification_tips:
      - Very light
      - Breaks into small pieces
      - Recycling symbol #6
    notes: "NOT recyclable - avoid using"
      
  OTHER_PLASTIC:
    full_name: "Other Plastics"
    resin_code: 7
    recyclable: false
    default_bin: TRASH
    common_items:
      - Mixed plastics
      - Bioplastics
      - Multi-layer packaging
    notes: "Generally not recyclable"

  # ---------------------------------------------------------------------------
  # METALS
  # ---------------------------------------------------------------------------
  ALUMINUM:
    recyclable: true
    default_bin: METAL
    common_items:
      - Beverage cans
      - Foil
      - Pie tins
    identification_tips:
      - Lightweight
      - Non-magnetic
      - Shiny surface
      
  STEEL:
    recyclable: true
    default_bin: METAL
    common_items:
      - Food cans
      - Aerosol cans
      - Lids
    identification_tips:
      - Magnetic
      - Heavier than aluminum
      - May have seams

  # ---------------------------------------------------------------------------
  # GLASS
  # ---------------------------------------------------------------------------
  GLASS:
    recyclable: true
    default_bin: GLASS
    common_items:
      - Bottles
      - Jars
      - Containers
    identification_tips:
      - Heavy
      - Transparent or colored
      - Hard and brittle

  # ---------------------------------------------------------------------------
  # PAPER
  # ---------------------------------------------------------------------------
  PAPER:
    recyclable: true
    default_bin: PAPER
    condition_rules:
      - condition: soiled
        override_bin: COMPOST
      - condition: wet
        override_bin: TRASH
    common_items:
      - Office paper
      - Newspaper
      - Magazines
      
  CARDBOARD:
    recyclable: true
    default_bin: PAPER
    condition_rules:
      - condition: soiled
        override_bin: TRASH  # Heavy grease
      - condition: wet
        override_bin: TRASH
    common_items:
      - Shipping boxes
      - Cereal boxes
      - Packaging

  # ---------------------------------------------------------------------------
  # ORGANIC
  # ---------------------------------------------------------------------------
  ORGANIC:
    recyclable: false
    default_bin: COMPOST
    common_items:
      - Food scraps
      - Coffee grounds
      - Yard waste

  # ---------------------------------------------------------------------------
  # OTHER
  # ---------------------------------------------------------------------------
  COMPOSITE:
    recyclable: false
    default_bin: TRASH
    common_items:
      - Chip bags
      - Tetra Pak (varies by location)
      - Wax-lined cups
    notes: "Made of multiple materials, hard to separate"
      
  TEXTILE:
    recyclable: false
    default_bin: TRASH
    common_items:
      - Clothing scraps
      - Fabric
    notes: "Donate if in good condition"


# =============================================================================
# CONDITION DEFINITIONS
# =============================================================================

conditions:
  clean:
    description: "No visible contamination, ready for recycling"
    effect: "Use default bin assignment"
    
  soiled:
    description: "Food residue or other contamination visible"
    effect: "May redirect to different bin"
    rules:
      - material: [PLASTIC, ALUMINUM, STEEL]
        override_bin: TRASH
      - material: [PAPER, CARDBOARD]
        override_bin: COMPOST  # Can be composted if food-soiled
        
  wet:
    description: "Visibly wet or water-damaged"
    effect: "Paper products become non-recyclable"
    rules:
      - material: [PAPER, CARDBOARD]
        override_bin: TRASH
        
  crushed:
    description: "Deformed but still identifiable"
    effect: "No change to bin assignment"
    
  damaged:
    description: "Torn, broken, or significantly damaged"
    effect: "No change to bin assignment"


